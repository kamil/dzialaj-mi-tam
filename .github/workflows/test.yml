name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          /usr/bin/ruby --version
          uname -a

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Find binary
        id: binary
        run: |
          BINARY=$(readlink "$(which claude)")
          echo "path=$BINARY" >> "$GITHUB_OUTPUT"
          echo "Binary: $BINARY"
          file "$BINARY"

      - name: List original verbs
        run: |
          COUNT=$(/usr/bin/ruby patch.rb --list | wc -l | tr -d ' ')
          echo "Original: $COUNT verbs"
          /usr/bin/ruby patch.rb --list | head -5
          [ "$COUNT" -ge 50 ]

      - name: Patch with polak
        run: |
          /usr/bin/ruby patch.rb verbs/polak.json
          /usr/bin/ruby patch.rb --list | head -5
          ! /usr/bin/ruby patch.rb --list | grep -q "Accomplishing"

      - name: Restore
        run: |
          /usr/bin/ruby patch.rb --restore
          FIRST=$(/usr/bin/ruby patch.rb --list | head -1)
          echo "After restore: $FIRST"
          [ "$FIRST" = "Accomplishing" ]

      - name: Test all packs
        run: |
          for pack in verbs/*.json; do
            NAME=$(basename "$pack")
            echo "=== $NAME ==="
            /usr/bin/ruby patch.rb --restore 2>/dev/null
            rm -f "${{ steps.binary.outputs.path }}.backup"
            /usr/bin/ruby patch.rb "$pack"
            COUNT=$(/usr/bin/ruby patch.rb --list | wc -l | tr -d ' ')
            echo "  $COUNT verbs"
            [ "$COUNT" -ge 50 ]
            echo "  OK"
          done

      - name: Binary runs after patch
        run: |
          /usr/bin/ruby patch.rb --restore 2>/dev/null
          rm -f "${{ steps.binary.outputs.path }}.backup"
          /usr/bin/ruby patch.rb verbs/cursed.json
          timeout 5 claude --version 2>&1 || true
          echo "Binary executes"

      - name: Restore
        if: always()
        run: /usr/bin/ruby patch.rb --restore 2>/dev/null || true
